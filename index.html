<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gulliver — ссылки на изображения</title>
<style>
  :root {
    --ink: #1c2333;
    --muted: #6b7280;
    --accent: #2f5fde;
    --accent-dark: #234ab0;
    --bg: #f6f7fb;
    --card: #ffffff;
    --line: #e4e7ef;
    --ok: #178a4c;
    --warn: #b45309;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .app { width: 100%; max-width: 720px; }
  h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
  .sub { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px;
    margin-top: 20px;
  }
  label { font-size: 0.85rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: 8px; }
  textarea {
    width: 100%;
    min-height: 90px;
    font-size: 1.05rem;
    font-family: "Consolas", "SF Mono", monospace;
    padding: 12px 14px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    outline: none;
    text-transform: uppercase;
    resize: vertical;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #c3c8d4; text-transform: none; }
  button {
    font-size: 0.95rem;
    font-weight: 600;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent-dark); }
  .go-row { margin-top: 12px; }
  .sku-title {
    font-family: "Consolas", "SF Mono", monospace;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 14px;
  }
  .links { list-style: none; margin-top: 118px; }
  .links li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 0;
    border-bottom: 1px solid var(--line);
  }
  .links li:last-child { border-bottom: none; }
  .num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--bg);
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .links a {
    color: var(--accent);
    text-decoration: none;
    font-family: "Consolas", "SF Mono", monospace;
    font-size: 0.82rem;
    word-break: break-all;
  }
  .links a:hover { text-decoration: underline; }
  .copy-btn {
    background: var(--bg);
    color: var(--ink);
    font-size: 0.78rem;
    padding: 6px 10px;
    flex-shrink: 0;
  }
  .copy-btn:hover { background: var(--line); }
  .empty-note { color: var(--warn); font-size: 0.88rem; }
  .thumbs { display: flex; gap: 8px; flex-wrap: wrap; }
  .thumbs img {
    width: 192px; height: 256px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg);
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="app">
  <h1>Фиксик-скачивальщик картинок Gulliver</h1>
  <p class="sub">Вставь в поле артикул без размера. Можно сразу списком — каждый с новой строки, через запятую или пробел.</p>

  <div class="card">
    <label for="sku">Артикул (SKU) — один или список</label>
    <textarea id="sku" placeholder="12602GMC1602&#10;12001GMC7501&#10;12601GMC2506"></textarea>
    <div class="go-row">
      <button id="go">Сгенерировать</button>
    </div>
  </div>

  <div id="results"></div>
</div>

<script>
const TEMPLATE = sku => i =>
  `https://pics.gulliver.ru/ioss(quality=90,resize=1500)/catalog/gulliver/${sku}/${i}.jpg`;

const $ = id => document.getElementById(id);

function parseSkus(text) {
  // Разбиваем по переводам строк, запятым, точкам с запятой и пробелам
  const parts = text.toUpperCase().split(/[\s,;]+/).filter(Boolean);
  // Убираем дубликаты, сохраняя порядок
  return [...new Set(parts)];
}

function renderSkuCard(sku, container) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="sku-title">${sku}</div>
    <div class="thumbs"></div>
    <ul class="links"></ul>
    <div class="empty-note" style="display:none">Изображения не найдены — проверь артикул.</div>`;
  container.appendChild(card);

  const thumbs = card.querySelector(".thumbs");
  const list = card.querySelector(".links");
  const emptyNote = card.querySelector(".empty-note");
  const make = TEMPLATE(sku);
  let loaded = 0, finished = 0;

  // Проверяем оба варианта нумерации фото: 1–5 и 61–65
  const NUMS = [1,2,3,4,5,61,62,63,64,65];
  NUMS.forEach((i, idx) => {
    const url = make(i);

    // Строка ссылки — скрыта, покажем только если фото существует
    const li = document.createElement("li");
    li.style.display = "none";
    li.innerHTML = `<span class="num">${i}</span>
      <a href="${url}" target="_blank" rel="noopener">${url}</a>
      <button class="copy-btn">Копировать</button>`;
    li.querySelector(".copy-btn").onclick = (e) => {
      navigator.clipboard.writeText(url);
      e.target.textContent = "Готово ✓";
      setTimeout(() => e.target.textContent = "Копировать", 1500);
    };
    list.appendChild(li);

    // Превью
    const img = document.createElement("img");
    img.src = url;
    img.alt = `${sku} — фото ${i}`;
    img.onclick = () => window.open(url, "_blank");
    img.onload = () => {
      li.style.display = "flex";
      loaded++; finished++;
      checkEmpty();
    };
    img.onerror = () => {
      img.remove(); li.remove();
      finished++;
      checkEmpty();
    };
    thumbs.appendChild(img);
  });

  function checkEmpty() {
    if (finished === NUMS.length && loaded === 0) {
      list.style.display = "none";
      emptyNote.style.display = "block";
    }
  }
}

function generate() {
  const skus = parseSkus($("sku").value);
  if (skus.length === 0) return;
  const container = $("results");
  container.innerHTML = "";
  skus.forEach(sku => renderSkuCard(sku, container));
}

$("go").onclick = generate;
$("sku").addEventListener("keydown", e => {
  // Ctrl+Enter или Cmd+Enter запускают генерацию (обычный Enter — новая строка)
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) generate();
});
</script>
</body>
</html>
